<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlap - Find Common Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='35' cy='50' r='25' fill='%236366f1' opacity='0.7'/><circle cx='65' cy='50' r='25' fill='%2310b981' opacity='0.7'/></svg>">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #10b981;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --overlap-bg: #dbeafe;
      --overlap-border: #3b82f6;
      --error: #ef4444;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    ::selection {
      background: var(--primary);
      color: white;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px 60px;
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInUp 0.5s ease-out;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header h1 svg {
      width: 40px;
      height: 40px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 2rem;
      }
      .header p {
        font-size: 1rem;
      }
    }

    /* Sections */
    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    /* Participants Grid */
    .participants-grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .participants-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }

    /* Participant Card */
    .participant-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      animation: fadeInUp 0.3s ease-out;
    }

    .participant-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .participant-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .participant-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      border: none;
      background: transparent;
      padding: 4px 8px;
      margin: -4px -8px;
      border-radius: var(--radius-xs);
      width: 100%;
      max-width: 180px;
    }

    .participant-name:hover {
      background: var(--bg);
    }

    .participant-name:focus {
      outline: none;
      background: var(--bg);
      box-shadow: 0 0 0 2px var(--primary);
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-xs);
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn:hover {
      color: var(--error);
      background: #fef2f2;
    }

    .remove-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Time Slots */
    .slots-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 36px;
    }

    .slot-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-primary);
      animation: fadeIn 0.2s ease-out;
    }

    .slot-chip .remove-slot {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      margin-left: 2px;
    }

    .slot-chip .remove-slot:hover {
      color: var(--error);
      background: #fee2e2;
    }

    .slot-chip .remove-slot svg {
      width: 14px;
      height: 14px;
    }

    .empty-slots {
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-style: italic;
      padding: 8px 0;
    }

    /* Add Slot Button */
    .add-slot-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border);
      color: var(--text-secondary);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .add-slot-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .add-slot-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Slot Form */
    .slot-form {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 12px;
      animation: fadeIn 0.2s ease-out;
    }

    .slot-form-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 100px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-group input.error {
      border-color: var(--error);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg);
      color: var(--text-primary);
    }

    /* Add Participant Card */
    .add-participant-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 140px;
    }

    .add-participant-card:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.02);
    }

    .add-participant-card svg {
      width: 32px;
      height: 32px;
      color: var(--text-secondary);
    }

    .add-participant-card span {
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* New Participant Form */
    .new-participant-form {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      animation: fadeInUp 0.3s ease-out;
    }

    .new-participant-form .form-group {
      margin-bottom: 16px;
    }

    .new-participant-form input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .new-participant-form input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .new-participant-form .form-actions {
      margin-top: 20px;
    }

    /* Results Section */
    .results-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .results-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .results-header h2 svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .participant-count {
      font-size: 0.875rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .overlap-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .overlap-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: var(--radius-sm);
      background: var(--overlap-bg);
      border: 1px solid var(--overlap-border);
      transition: transform 0.2s ease;
      animation: fadeInUp 0.3s ease-out;
    }

    .overlap-item.perfect {
      background: #d1fae5;
      border-color: var(--accent);
    }

    .overlap-item:hover {
      transform: translateX(4px);
    }

    .overlap-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 140px;
    }

    .overlap-info {
      flex: 1;
    }

    .overlap-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .overlap-item.perfect .overlap-badge {
      color: #059669;
    }

    .overlap-badge svg {
      width: 14px;
      height: 14px;
    }

    .overlap-bar {
      width: 100%;
      height: 6px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .overlap-item.perfect .overlap-bar {
      background: rgba(16, 185, 129, 0.2);
    }

    .overlap-bar-fill {
      height: 100%;
      background: var(--overlap-border);
      border-radius: 3px;
      transition: width 0.4s ease-out;
    }

    .overlap-item.perfect .overlap-bar-fill {
      background: var(--accent);
    }

    /* Empty States */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    .no-overlaps {
      text-align: center;
      padding: 32px;
      color: var(--text-secondary);
    }

    .no-overlaps svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 0.8125rem;
    }

    .footer span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hidden */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="16" cy="20" r="12" fill="#6366f1" opacity="0.8"/>
          <circle cx="24" cy="20" r="12" fill="#10b981" opacity="0.8"/>
        </svg>
        Overlap
      </h1>
      <p>Find common time for everyone</p>
    </header>

    <section class="section" id="participants-section">
      <h2 class="section-title">Participants</h2>
      <div class="participants-grid" id="participants-grid">
        <!-- Participant cards will be rendered here -->
        <div class="add-participant-card" id="add-participant-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          <span>Add Participant</span>
        </div>
      </div>
    </section>

    <section class="section" id="results-section">
      <h2 class="section-title">Common Time Slots</h2>
      <div class="results-card" id="results-card">
        <div class="empty-state" id="results-empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <h3>No participants yet</h3>
          <p>Add participants and their available times to find overlaps</p>
        </div>
        <div id="results-content" class="hidden">
          <div class="results-header">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Available Times
            </h2>
            <span class="participant-count" id="participant-count">0 participants</span>
          </div>
          <div class="overlap-list" id="overlap-list">
            <!-- Overlap items will be rendered here -->
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="footer">
    <span>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <path d="M12 17h.01"/>
      </svg>
      Enter times in 24-hour format (e.g., 09:00 - 17:00)
    </span>
  </footer>

  <script>
    // State
    const state = {
      participants: [],
      nextId: 1
    };

    // DOM Elements
    const participantsGrid = document.getElementById('participants-grid');
    const addParticipantBtn = document.getElementById('add-participant-btn');
    const resultsEmpty = document.getElementById('results-empty');
    const resultsContent = document.getElementById('results-content');
    const participantCount = document.getElementById('participant-count');
    const overlapList = document.getElementById('overlap-list');

    // Icons
    const icons = {
      x: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      plus: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
      check: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      users: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`
    };

    // Generate unique ID
    function generateId() {
      return `id_${state.nextId++}`;
    }

    // Parse time string to minutes
    function parseTime(timeStr) {
      const [hours, minutes] = timeStr.split(':').map(Number);
      return hours * 60 + minutes;
    }

    // Format minutes to time string
    function formatTime(minutes) {
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
    }

    // Time range intersection
    function rangesOverlap(start1, end1, start2, end2) {
      return Math.max(start1, start2) < Math.min(end1, end2);
    }

    // Find overlaps
    function findOverlaps() {
      const participantsWithSlots = state.participants.filter(p => p.slots.length > 0);
      if (participantsWithSlots.length < 2) return [];

      const allSlots = participantsWithSlots.flatMap(p => p.slots.map(s => ({
        start: parseTime(s.start),
        end: parseTime(s.end),
        participantId: p.id
      })));

      const boundaries = [...new Set(allSlots.flatMap(s => [s.start, s.end]))].sort((a, b) => a - b);
      const overlaps = [];

      for (let i = 0; i < boundaries.length - 1; i++) {
        const segmentStart = boundaries[i];
        const segmentEnd = boundaries[i + 1];
        
        const availableCount = participantsWithSlots.filter(p => 
          p.slots.some(s => {
            const start = parseTime(s.start);
            const end = parseTime(s.end);
            return start <= segmentStart && end >= segmentEnd;
          })
        ).length;

        if (availableCount >= 2) {
          overlaps.push({
            start: segmentStart,
            end: segmentEnd,
            count: availableCount,
            total: participantsWithSlots.length,
            isPerfect: availableCount === participantsWithSlots.length
          });
        }
      }

      // Merge adjacent overlaps
      const merged = [];
      for (const overlap of overlaps) {
        const last = merged[merged.length - 1];
        if (last && last.end === overlap.start && last.count === overlap.count) {
          last.end = overlap.end;
        } else {
          merged.push({ ...overlap });
        }
      }

      return merged;
    }

    // Render participant card
    function renderParticipantCard(participant) {
      const card = document.createElement('div');
      card.className = 'participant-card';
      card.dataset.id = participant.id;

      card.innerHTML = `
        <div class="participant-header">
          <input type="text" class="participant-name" value="${escapeHtml(participant.name)}" placeholder="Name">
          <button class="remove-btn" title="Remove participant">
            ${icons.x}
          </button>
        </div>
        <div class="slots-container">
          ${participant.slots.length === 0 
            ? '<span class="empty-slots">No time slots added</span>' 
            : participant.slots.map(slot => `
                <span class="slot-chip">
                  ${escapeHtml(slot.start)} - ${escapeHtml(slot.end)}
                  <button class="remove-slot" data-slot-id="${slot.id}">
                    ${icons.x}
                  </button>
                </span>
              `).join('')
          }
        </div>
        <button class="add-slot-btn">
          ${icons.plus}
          Add Time Slot
        </button>
      `;

      // Event listeners
      const nameInput = card.querySelector('.participant-name');
      nameInput.addEventListener('change', (e) => {
        participant.name = e.target.value.trim() || 'Unnamed';
        renderResults();
      });

      card.querySelector('.remove-btn').addEventListener('click', () => {
        state.participants = state.participants.filter(p => p.id !== participant.id);
        renderParticipants();
        renderResults();
      });

      card.querySelector('.add-slot-btn').addEventListener('click', () => {
        showSlotForm(card, participant);
      });

      card.querySelectorAll('.remove-slot').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slotId = btn.dataset.slotId;
          participant.slots = participant.slots.filter(s => s.id !== slotId);
          renderParticipants();
          renderResults();
        });
      });

      return card;
    }

    // Show slot form
    function showSlotForm(card, participant) {
      const existingForm = card.querySelector('.slot-form');
      if (existingForm) {
        existingForm.remove();
        return;
      }

      const form = document.createElement('div');
      form.className = 'slot-form';
      form.innerHTML = `
        <div class="slot-form-row">
          <div class="form-group">
            <label>From</label>
            <input type="time" class="start-time" value="09:00" step="900">
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="time" class="end-time" value="17:00" step="900">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary add-slot-confirm">Add Slot</button>
          <button class="btn btn-secondary cancel-slot">Cancel</button>
        </div>
      `;

      const slotsContainer = card.querySelector('.slots-container');
      const addBtn = card.querySelector('.add-slot-btn');
      slotsContainer.after(form);

      const startInput = form.querySelector('.start-time');
      const endInput = form.querySelector('.end-time');

      form.querySelector('.add-slot-confirm').addEventListener('click', () => {
        const start = startInput.value;
        const end = endInput.value;

        if (!start || !end) {
          startInput.classList.add('error');
          endInput.classList.add('error');
          return;
        }

        const startMinutes = parseTime(start);
        const endMinutes = parseTime(end);

        if (startMinutes >= endMinutes) {
          endInput.classList.add('error');
          return;
        }

        participant.slots.push({
          id: generateId(),
          start,
          end
        });

        form.remove();
        renderParticipants();
        renderResults();
      });

      form.querySelector('.cancel-slot').addEventListener('click', () => {
        form.remove();
      });

      startInput.addEventListener('input', () => {
        startInput.classList.remove('error');
        endInput.classList.remove('error');
      });

      endInput.addEventListener('input', () => {
        startInput.classList.remove('error');
        endInput.classList.remove('error');
      });

      startInput.focus();
    }

    // Show new participant form
    function showNewParticipantForm() {
      const existingForm = document.querySelector('.new-participant-form');
      if (existingForm) {
        existingForm.remove();
        return;
      }

      const form = document.createElement('div');
      form.className = 'new-participant-form';
      form.innerHTML = `
        <div class="form-group">
          <input type="text" placeholder="Enter participant name" class="participant-name-input" autofocus>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary add-participant-confirm">Add</button>
          <button class="btn btn-secondary cancel-participant">Cancel</button>
        </div>
      `;

      addParticipantBtn.after(form);

      const nameInput = form.querySelector('.participant-name-input');

      form.querySelector('.add-participant-confirm').addEventListener('click', () => {
        const name = nameInput.value.trim();
        if (!name) {
          nameInput.classList.add('error');
          return;
        }

        state.participants.push({
          id: generateId(),
          name,
          slots: []
        });

        form.remove();
        renderParticipants();
        renderResults();
      });

      form.querySelector('.cancel-participant').addEventListener('click', () => {
        form.remove();
      });

      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          form.querySelector('.add-participant-confirm').click();
        } else if (e.key === 'Escape') {
          form.remove();
        }
      });

      nameInput.focus();
    }

    // Render participants
    function renderParticipants() {
      const cards = participantsGrid.querySelectorAll('.participant-card');
      cards.forEach(card => card.remove());

      state.participants.forEach(participant => {
        const card = renderParticipantCard(participant);
        participantsGrid.insertBefore(card, addParticipantBtn);
      });
    }

    // Render results
    function renderResults() {
      const participantsWithSlots = state.participants.filter(p => p.slots.length > 0);
      const totalParticipants = participantsWithSlots.length;

      if (totalParticipants === 0) {
        resultsEmpty.classList.remove('hidden');
        resultsContent.classList.add('hidden');
        return;
      }

      resultsEmpty.classList.add('hidden');
      resultsContent.classList.remove('hidden');

      participantCount.textContent = `${totalParticipants} participant${totalParticipants !== 1 ? 's' : ''}`;

      const overlaps = findOverlaps();
      overlapList.innerHTML = '';

      if (overlaps.length === 0) {
        overlapList.innerHTML = `
          <div class="no-overlaps">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>No common time slots found</p>
          </div>
        `;
        return;
      }

      overlaps.forEach((overlap, index) => {
        const item = document.createElement('div');
        item.className = `overlap-item${overlap.isPerfect ? ' perfect' : ''}`;
        item.style.animationDelay = `${index * 50}ms`;

        const percentage = (overlap.count / overlap.total) * 100;

        item.innerHTML = `
          <div class="overlap-time">${formatTime(overlap.start)} - ${formatTime(overlap.end)}</div>
          <div class="overlap-info">
            <div class="overlap-badge">
              ${overlap.isPerfect ? icons.check : ''}
              ${overlap.count} of ${overlap.total} available
            </div>
            <div class="overlap-bar">
              <div class="overlap-bar-fill" style="width: ${percentage}%"></div>
            </div>
          </div>
        `;

        overlapList.appendChild(item);
      });
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    addParticipantBtn.addEventListener('click', showNewParticipantForm);

    // Initial render
    renderParticipants();
    renderResults();
  </script>
</body>
</html>
