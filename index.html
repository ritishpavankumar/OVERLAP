<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlap - Find Common Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='35' cy='50' r='25' fill='%236366f1' opacity='0.7'/><circle cx='65' cy='50' r='25' fill='%2310b981' opacity='0.7'/></svg>">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent: #10b981;
      --accent-light: #d1fae5;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --overlap-bg: #dbeafe;
      --overlap-border: #3b82f6;
      --suggestion-bg: #fef3c7;
      --suggestion-border: #f59e0b;
      --error: #ef4444;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    ::selection {
      background: var(--primary);
      color: white;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px 60px;
      }
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInUp 0.5s ease-out;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header h1 svg {
      width: 40px;
      height: 40px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 2rem;
      }
      .header p {
        font-size: 1rem;
      }
    }

    .topic-section {
      margin-bottom: 32px;
      animation: fadeInUp 0.5s ease-out 0.1s both;
    }

    .topic-input-wrapper {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topic-input-wrapper svg {
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .topic-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
    }

    .topic-input::placeholder {
      color: var(--text-secondary);
    }

    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .participants-grid {
      display: grid;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .participants-grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      }
    }

    .participant-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      animation: fadeInUp 0.3s ease-out;
    }

    .participant-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .participant-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .participant-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      border: none;
      background: transparent;
      padding: 4px 8px;
      margin: -4px -8px;
      border-radius: var(--radius-xs);
      width: 100%;
      max-width: 180px;
    }

    .participant-name:hover {
      background: var(--bg);
    }

    .participant-name:focus {
      outline: none;
      background: var(--bg);
      box-shadow: 0 0 0 2px var(--primary);
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-xs);
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .remove-btn:hover {
      color: var(--error);
      background: #fef2f2;
    }

    .remove-btn svg {
      width: 18px;
      height: 18px;
    }

    .slots-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 36px;
    }

    .slot-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 10px 6px 14px;
      font-size: 0.8125rem;
      animation: fadeIn 0.2s ease-out;
    }

    .slot-chip .date-badge {
      background: var(--primary);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.75rem;
    }

    .slot-chip .time-range {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      color: var(--text-primary);
    }

    .slot-chip .remove-slot {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .slot-chip .remove-slot:hover {
      color: var(--error);
      background: #fee2e2;
    }

    .slot-chip .remove-slot svg {
      width: 14px;
      height: 14px;
    }

    .empty-slots {
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-style: italic;
      padding: 8px 0;
    }

    .add-slot-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--border);
      color: var(--text-secondary);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .add-slot-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .add-slot-btn svg {
      width: 16px;
      height: 16px;
    }

    .slot-form {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 12px;
      animation: fadeIn 0.2s ease-out;
    }

    .slot-form-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-group {
      flex: 1;
      min-width: 100px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input[type="text"] {
      font-family: 'Inter', system-ui, sans-serif;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .form-group input.error {
      border-color: var(--error);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg);
      color: var(--text-primary);
    }

    .btn-success {
      background: var(--accent);
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .add-participant-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 140px;
    }

    .add-participant-card:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.02);
    }

    .add-participant-card svg {
      width: 32px;
      height: 32px;
      color: var(--text-secondary);
    }

    .add-participant-card span {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .new-participant-form {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      animation: fadeInUp 0.3s ease-out;
    }

    .new-participant-form .form-group {
      margin-bottom: 16px;
    }

    .new-participant-form input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .new-participant-form input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .new-participant-form input[type="date"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .new-participant-form input[type="date"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .new-participant-form .form-actions {
      margin-top: 20px;
    }

    .results-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-header h2 {
      font-size: 1.125rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .results-header h2 svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
    }

    .results-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .participant-count {
      font-size: 0.875rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .export-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--text-primary);
      color: white;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .export-btn:hover {
      background: #1e293b;
    }

    .export-btn:active {
      transform: scale(0.98);
    }

    .export-btn svg {
      width: 16px;
      height: 16px;
    }

    .export-btn.success {
      background: var(--accent);
    }

    .suggested-slot {
      background: linear-gradient(135deg, var(--suggestion-bg) 0%, #fde68a 100%);
      border: 2px solid var(--suggestion-border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      animation: fadeInUp 0.4s ease-out;
    }

    .suggested-slot.perfect {
      background: linear-gradient(135deg, var(--accent-light) 0%, #a7f3d0 100%);
      border-color: var(--accent);
    }

    .suggested-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #92400e;
    }

    .suggested-slot.perfect .suggested-header {
      color: #065f46;
    }

    .suggested-header svg {
      width: 20px;
      height: 20px;
    }

    .suggested-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .suggested-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .suggested-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .suggested-meta svg {
      width: 14px;
      height: 14px;
    }

    .overlap-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .overlap-date-group {
      margin-bottom: 8px;
    }

    .overlap-date-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .overlap-date-label:first-child {
      margin-top: 0;
    }

    .overlap-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: var(--radius-sm);
      background: var(--overlap-bg);
      border: 1px solid var(--overlap-border);
      transition: transform 0.2s ease;
      animation: fadeInUp 0.3s ease-out;
    }

    .overlap-item.perfect {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .overlap-item:hover {
      transform: translateX(4px);
    }

    .overlap-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      min-width: 140px;
    }

    .overlap-info {
      flex: 1;
    }

    .overlap-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .overlap-item.perfect .overlap-badge {
      color: #059669;
    }

    .overlap-badge svg {
      width: 14px;
      height: 14px;
    }

    .overlap-duration {
      font-size: 0.75rem;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.05);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }

    .overlap-item.perfect .overlap-duration {
      background: rgba(16, 185, 129, 0.2);
      color: #065f46;
    }

    .overlap-bar {
      width: 100%;
      height: 6px;
      background: rgba(59, 130, 246, 0.2);
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .overlap-item.perfect .overlap-bar {
      background: rgba(16, 185, 129, 0.2);
    }

    .overlap-bar-fill {
      height: 100%;
      background: var(--overlap-border);
      border-radius: 3px;
      transition: width 0.4s ease-out;
    }

    .overlap-item.perfect .overlap-bar-fill {
      background: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    .no-overlaps {
      text-align: center;
      padding: 32px;
      color: var(--text-secondary);
    }

    .no-overlaps svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-secondary);
      font-size: 0.8125rem;
    }

    .footer span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="16" cy="20" r="12" fill="#6366f1" opacity="0.8"/>
          <circle cx="24" cy="20" r="12" fill="#10b981" opacity="0.8"/>
        </svg>
        Overlap
      </h1>
      <p>Find common time for everyone</p>
    </header>

    <section class="topic-section">
      <div class="topic-input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <input type="text" class="topic-input" id="topic-input" placeholder="Meeting topic (optional) - e.g., Weekly sync, Project kickoff, Team debate...">
      </div>
    </section>

    <section class="section" id="participants-section">
      <h2 class="section-title">Participants</h2>
      <div class="participants-grid" id="participants-grid">
        <div class="add-participant-card" id="add-participant-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <line x1="19" y1="8" x2="19" y2="14"/>
            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
          <span>Add Participant</span>
        </div>
      </div>
    </section>

    <section class="section" id="results-section">
      <h2 class="section-title">Common Time Slots</h2>
      <div class="results-card" id="results-card">
        <div class="empty-state" id="results-empty">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <h3>No participants yet</h3>
          <p>Add participants and their available times to find overlaps</p>
        </div>
        <div id="results-content" class="hidden">
          <div id="suggested-slot-container"></div>
          <div class="results-header">
            <h2>
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              Available Times
            </h2>
            <div class="results-meta">
              <span class="participant-count" id="participant-count">0 participants</span>
              <button class="export-btn" id="export-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="7 10 12 15 17 10"/>
                  <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export
              </button>
            </div>
          </div>
          <div class="overlap-list" id="overlap-list"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toast-message">Copied to clipboard!</span>
  </div>

  <footer class="footer">
    Built by Ritish &bull; 2026
  </footer>

  <script>
    const state = {
      topic: '',
      participants: [],
      nextId: 1
    };

    const participantsGrid = document.getElementById('participants-grid');
    const addParticipantBtn = document.getElementById('add-participant-btn');
    const resultsEmpty = document.getElementById('results-empty');
    const resultsContent = document.getElementById('results-content');
    const participantCount = document.getElementById('participant-count');
    const overlapList = document.getElementById('overlap-list');
    const suggestedContainer = document.getElementById('suggested-slot-container');
    const exportBtn = document.getElementById('export-btn');
    const topicInput = document.getElementById('topic-input');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toast-message');

    const icons = {
      x: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
      plus: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
      check: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
      star: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
      zap: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
      clock: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      users: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`
    };

    function generateId() {
      return `id_${state.nextId++}`;
    }

    function parseTime(timeStr) {
      const [hours, minutes] = timeStr.split(':').map(Number);
      return hours * 60 + minutes;
    }

    function formatTime(minutes) {
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;
    }

    function formatDuration(minutes) {
      if (minutes < 60) return `${minutes}m`;
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return mins > 0 ? `${hours}h ${mins}m` : `${hours}h`;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-US', { 
        weekday: 'short', 
        month: 'short', 
        day: 'numeric' 
      });
    }

    function formatDateFull(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-US', { 
        weekday: 'long', 
        year: 'numeric',
        month: 'long', 
        day: 'numeric' 
      });
    }

    function getTodayDate() {
      return new Date().toISOString().split('T')[0];
    }

    function findOverlaps() {
      const participantsWithSlots = state.participants.filter(p => p.slots.length > 0);
      if (participantsWithSlots.length < 2) return {};

      const slotsByDate = {};
      participantsWithSlots.forEach(p => {
        p.slots.forEach(slot => {
          if (!slotsByDate[slot.date]) slotsByDate[slot.date] = [];
          slotsByDate[slot.date].push({
            start: parseTime(slot.start),
            end: parseTime(slot.end),
            participantId: p.id
          });
        });
      });

      const allOverlaps = {};

      Object.keys(slotsByDate).forEach(date => {
        const slots = slotsByDate[date];
        const boundaries = [...new Set(slots.flatMap(s => [s.start, s.end]))].sort((a, b) => a - b);
        const overlaps = [];

        for (let i = 0; i < boundaries.length - 1; i++) {
          const segmentStart = boundaries[i];
          const segmentEnd = boundaries[i + 1];
          
          const availableCount = participantsWithSlots.filter(p => 
            p.slots.some(s => s.date === date && {
              start: parseTime(s.start),
              end: parseTime(s.end)
            } && 
            parseTime(s.start) <= segmentStart && 
            parseTime(s.end) >= segmentEnd)
          ).length;

          if (availableCount >= 2) {
            overlaps.push({
              date,
              start: segmentStart,
              end: segmentEnd,
              count: availableCount,
              total: participantsWithSlots.length,
              isPerfect: availableCount === participantsWithSlots.length
            });
          }
        }

        const merged = [];
        for (const overlap of overlaps) {
          const last = merged[merged.length - 1];
          if (last && last.end === overlap.start && last.count === overlap.count) {
            last.end = overlap.end;
          } else {
            merged.push({ ...overlap });
          }
        }

        if (merged.length > 0) {
          allOverlaps[date] = merged;
        }
      });

      return allOverlaps;
    }

    function getBestSlot(overlaps) {
      const allSlots = [];
      Object.values(overlaps).forEach(dateOverlaps => {
        dateOverlaps.forEach(o => {
          allSlots.push(o);
        });
      });

      if (allSlots.length === 0) return null;

      allSlots.sort((a, b) => {
        if (a.isPerfect !== b.isPerfect) return b.isPerfect - a.isPerfect;
        const durationA = a.end - a.start;
        const durationB = b.end - b.start;
        if (durationB !== durationA) return durationB - durationA;
        return b.count - a.count;
      });

      return allSlots[0];
    }

    function renderParticipantCard(participant) {
      const card = document.createElement('div');
      card.className = 'participant-card';
      card.dataset.id = participant.id;

      card.innerHTML = `
        <div class="participant-header">
          <input type="text" class="participant-name" value="${escapeHtml(participant.name)}" placeholder="Name">
          <button class="remove-btn" title="Remove participant">
            ${icons.x}
          </button>
        </div>
        <div class="slots-container">
          ${participant.slots.length === 0 
            ? '<span class="empty-slots">No time slots added</span>' 
            : participant.slots.map(slot => `
                <span class="slot-chip">
                  <span class="date-badge">${formatDate(slot.date)}</span>
                  <span class="time-range">${escapeHtml(slot.start)} - ${escapeHtml(slot.end)}</span>
                  <button class="remove-slot" data-slot-id="${slot.id}">
                    ${icons.x}
                  </button>
                </span>
              `).join('')
          }
        </div>
        <button class="add-slot-btn">
          ${icons.plus}
          Add Time Slot
        </button>
      `;

      const nameInput = card.querySelector('.participant-name');
      nameInput.addEventListener('change', (e) => {
        participant.name = e.target.value.trim() || 'Unnamed';
        renderResults();
      });

      card.querySelector('.remove-btn').addEventListener('click', () => {
        state.participants = state.participants.filter(p => p.id !== participant.id);
        renderParticipants();
        renderResults();
      });

      card.querySelector('.add-slot-btn').addEventListener('click', () => {
        showSlotForm(card, participant);
      });

      card.querySelectorAll('.remove-slot').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const slotId = btn.dataset.slotId;
          participant.slots = participant.slots.filter(s => s.id !== slotId);
          renderParticipants();
          renderResults();
        });
      });

      return card;
    }

    function showSlotForm(card, participant) {
      const existingForm = card.querySelector('.slot-form');
      if (existingForm) {
        existingForm.remove();
        return;
      }

      const form = document.createElement('div');
      form.className = 'slot-form';
      form.innerHTML = `
        <div class="slot-form-row">
          <div class="form-group" style="min-width: 130px;">
            <label>Date</label>
            <input type="date" class="slot-date" value="${getTodayDate()}">
          </div>
          <div class="form-group">
            <label>From</label>
            <input type="time" class="start-time" value="09:00" step="900">
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="time" class="end-time" value="17:00" step="900">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary add-slot-confirm">Add Slot</button>
          <button class="btn btn-secondary cancel-slot">Cancel</button>
        </div>
      `;

      const slotsContainer = card.querySelector('.slots-container');
      slotsContainer.after(form);

      const dateInput = form.querySelector('.slot-date');
      const startInput = form.querySelector('.start-time');
      const endInput = form.querySelector('.end-time');

      form.querySelector('.add-slot-confirm').addEventListener('click', () => {
        const date = dateInput.value;
        const start = startInput.value;
        const end = endInput.value;

        if (!date || !start || !end) {
          if (!date) dateInput.classList.add('error');
          if (!start) startInput.classList.add('error');
          if (!end) endInput.classList.add('error');
          return;
        }

        const startMinutes = parseTime(start);
        const endMinutes = parseTime(end);

        if (startMinutes >= endMinutes) {
          endInput.classList.add('error');
          return;
        }

        participant.slots.push({
          id: generateId(),
          date,
          start,
          end
        });

        form.remove();
        renderParticipants();
        renderResults();
      });

      form.querySelector('.cancel-slot').addEventListener('click', () => {
        form.remove();
      });

      [dateInput, startInput, endInput].forEach(input => {
        input.addEventListener('input', () => {
          dateInput.classList.remove('error');
          startInput.classList.remove('error');
          endInput.classList.remove('error');
        });
      });

      dateInput.focus();
    }

    function showNewParticipantForm() {
      const existingForm = document.querySelector('.new-participant-form');
      if (existingForm) {
        existingForm.remove();
        return;
      }

      const form = document.createElement('div');
      form.className = 'new-participant-form';
      form.innerHTML = `
        <div class="form-group">
          <label>Participant Name</label>
          <input type="text" placeholder="Enter participant name" class="participant-name-input" autofocus>
        </div>
        <div class="form-group">
          <label>Initial Date (optional)</label>
          <input type="date" class="participant-date-input" value="${getTodayDate()}">
        </div>
        <div class="form-actions">
          <button class="btn btn-primary add-participant-confirm">Add</button>
          <button class="btn btn-secondary cancel-participant">Cancel</button>
        </div>
      `;

      addParticipantBtn.after(form);

      const nameInput = form.querySelector('.participant-name-input');
      const dateInput = form.querySelector('.participant-date-input');

      form.querySelector('.add-participant-confirm').addEventListener('click', () => {
        const name = nameInput.value.trim();
        if (!name) {
          nameInput.classList.add('error');
          return;
        }

        const participant = {
          id: generateId(),
          name,
          slots: []
        };

        if (dateInput.value) {
          participant.slots.push({
            id: generateId(),
            date: dateInput.value,
            start: '09:00',
            end: '17:00'
          });
        }

        state.participants.push(participant);
        form.remove();
        renderParticipants();
        renderResults();
      });

      form.querySelector('.cancel-participant').addEventListener('click', () => {
        form.remove();
      });

      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          form.querySelector('.add-participant-confirm').click();
        } else if (e.key === 'Escape') {
          form.remove();
        }
      });

      nameInput.focus();
    }

    function renderParticipants() {
      const cards = participantsGrid.querySelectorAll('.participant-card');
      cards.forEach(card => card.remove());

      state.participants.forEach(participant => {
        const card = renderParticipantCard(participant);
        participantsGrid.insertBefore(card, addParticipantBtn);
      });
    }

    function renderSuggestedSlot(bestSlot) {
      if (!bestSlot) {
        suggestedContainer.innerHTML = '';
        return;
      }

      const duration = bestSlot.end - bestSlot.start;
      const icon = bestSlot.isPerfect ? icons.star : icons.zap;
      const label = bestSlot.isPerfect ? 'Best Slot' : 'Best Available';
      const className = bestSlot.isPerfect ? 'perfect' : '';

      suggestedContainer.innerHTML = `
        <div class="suggested-slot ${className}">
          <div class="suggested-header">
            ${icon}
            ${label}
          </div>
          <div class="suggested-time">
            ${formatDateFull(bestSlot.date)}, ${formatTime(bestSlot.start)} - ${formatTime(bestSlot.end)}
          </div>
          <div class="suggested-meta">
            <span>${icons.clock} ${formatDuration(duration)}</span>
            <span>${icons.users} ${bestSlot.count} of ${bestSlot.total} available</span>
          </div>
        </div>
      `;
    }

    function renderResults() {
      const participantsWithSlots = state.participants.filter(p => p.slots.length > 0);
      const totalParticipants = participantsWithSlots.length;

      if (totalParticipants === 0) {
        resultsEmpty.classList.remove('hidden');
        resultsContent.classList.add('hidden');
        suggestedContainer.innerHTML = '';
        return;
      }

      resultsEmpty.classList.add('hidden');
      resultsContent.classList.remove('hidden');

      participantCount.textContent = `${totalParticipants} participant${totalParticipants !== 1 ? 's' : ''}`;

      const overlaps = findOverlaps();
      const bestSlot = getBestSlot(overlaps);
      
      renderSuggestedSlot(bestSlot);

      overlapList.innerHTML = '';

      if (Object.keys(overlaps).length === 0) {
        overlapList.innerHTML = `
          <div class="no-overlaps">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>No common time slots found on matching dates</p>
          </div>
        `;
        return;
      }

      const sortedDates = Object.keys(overlaps).sort();

      sortedDates.forEach(date => {
        const dateGroup = document.createElement('div');
        dateGroup.className = 'overlap-date-group';
        dateGroup.innerHTML = `<div class="overlap-date-label">${formatDateFull(date)}</div>`;

        overlaps[date].forEach((overlap, index) => {
          const item = document.createElement('div');
          item.className = `overlap-item${overlap.isPerfect ? ' perfect' : ''}`;
          item.style.animationDelay = `${index * 50}ms`;

          const percentage = (overlap.count / overlap.total) * 100;
          const duration = overlap.end - overlap.start;

          item.innerHTML = `
            <div class="overlap-time">${formatTime(overlap.start)} - ${formatTime(overlap.end)}</div>
            <div class="overlap-info">
              <div class="overlap-badge">
                ${overlap.isPerfect ? icons.check : ''}
                ${overlap.count} of ${overlap.total} available
                <span class="overlap-duration">${formatDuration(duration)}</span>
              </div>
              <div class="overlap-bar">
                <div class="overlap-bar-fill" style="width: ${percentage}%"></div>
              </div>
            </div>
          `;

          dateGroup.appendChild(item);
        });

        overlapList.appendChild(dateGroup);
      });
    }

    function exportResults() {
      const participantsWithSlots = state.participants.filter(p => p.slots.length > 0);
      const overlaps = findOverlaps();
      const bestSlot = getBestSlot(overlaps);
      const topic = state.topic.trim();

      let text = '=== MEETING SCHEDULE ===\n\n';

      if (topic) {
        text += `Topic: ${topic}\n\n`;
      }

      if (bestSlot) {
        const duration = bestSlot.end - bestSlot.start;
        text += `RECOMMENDED SLOT:\n`;
        text += `${formatDateFull(bestSlot.date)}\n`;
        text += `${formatTime(bestSlot.start)} - ${formatTime(bestSlot.end)} (${formatDuration(duration)})\n`;
        text += `${bestSlot.count} of ${bestSlot.total} participants available\n`;
        if (bestSlot.isPerfect) text += 'All participants available!\n';
        text += '\n';
      }

      if (Object.keys(overlaps).length > 0) {
        text += 'ALL AVAILABLE SLOTS:\n';
        const sortedDates = Object.keys(overlaps).sort();
        
        sortedDates.forEach(date => {
          text += `\n${formatDateFull(date)}:\n`;
          overlaps[date].forEach(overlap => {
            const duration = overlap.end - overlap.start;
            text += `  ${formatTime(overlap.start)} - ${formatTime(overlap.end)} (${formatDuration(duration)}) - ${overlap.count}/${overlap.total}`;
            if (overlap.isPerfect) text += ' ✓';
            text += '\n';
          });
        });
      }

      text += '\nPARTICIPANTS:\n';
      state.participants.forEach(p => {
        if (p.slots.length === 0) {
          text += `- ${p.name}: No availability set\n`;
        } else {
          text += `- ${p.name}:\n`;
          p.slots.forEach(slot => {
            text += `    ${formatDate(slot.date)}: ${slot.start} - ${slot.end}\n`;
          });
        }
      });

      text += '\n' + '='.repeat(24);

      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!');
        exportBtn.classList.add('success');
        exportBtn.innerHTML = `
          ${icons.check}
          Copied!
        `;
        setTimeout(() => {
          exportBtn.classList.remove('success');
          exportBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Export
          `;
        }, 2000);
      }).catch(() => {
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'meeting-schedule.txt';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Downloaded as file');
      });
    }

    function showToast(message) {
      toastMessage.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    addParticipantBtn.addEventListener('click', showNewParticipantForm);
    exportBtn.addEventListener('click', exportResults);
    
    topicInput.addEventListener('input', (e) => {
      state.topic = e.target.value;
    });

    renderParticipants();
    renderResults();
  </script>
</body>
</html>
